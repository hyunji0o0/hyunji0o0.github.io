<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>아이패드 네컷 스튜디오 - 완벽 정렬 완성판</title>
    <style>
      body {
        font-family: "Malgun Gothic", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f0f4f8;
        margin: 0;
        padding: 20px;
        touch-action: manipulation;
      }
      h1 {
        color: #0056b3;
        margin-bottom: 5px;
      }
      .description {
        color: #666;
        margin-bottom: 20px;
      }
      .container {
        display: flex;
        gap: 40px;
        max-width: 1200px;
        width: 100%;
        justify-content: center;
        align-items: flex-start;
      }

      /* 왼쪽 촬영 패널 */
      .controls-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 480px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      #camera-view {
        width: 100%;
        max-width: 440px;
        aspect-ratio: 4/3;
        background: #000;
        border-radius: 12px;
        transform: scaleX(-1);
        border: 3px solid #b3d9ff;
      }
      .btn {
        margin-top: 15px;
        padding: 15px 30px;
        font-size: 18px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        box-sizing: border-box;
      }
      .btn:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }

      /* 6장 풀 */
      .pool-title {
        margin-top: 25px;
        font-weight: bold;
        color: #555;
        align-self: flex-start;
      }
      .photo-pool {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
        width: 100%;
      }
      .pool-item {
        width: 100%;
        aspect-ratio: 351/442;
        background: #ddd;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        border: 4px solid transparent;
        box-sizing: border-box;
      }
      .pool-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pool-item.selected {
        border-color: #28a745;
      }
      .pool-item .badge {
        position: absolute;
        top: 5px;
        right: 5px;
        background: #28a745;
        color: white;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: bold;
      }

      /* 오른쪽 미리보기 */
      .preview-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .frame-preview-container {
        position: relative;
        width: 360px;
        height: 531px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        border-radius: 10px;
        overflow: hidden;
      }

      /* 현지님이 조율하신 최적의 CSS 스펙 고정 */
      .photo-grid-under {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        padding: 30px 20px 52px 20px;
        gap: 2px 3px;
        box-sizing: border-box;
        z-index: 1;
        background-color: transparent;
      }

      .frame-slot {
        background-color: #eaeaea;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaa;
        font-size: 14px;
        border-radius: 3px;
      }
      .frame-slot img {
        width: 100%;
        height: 100%;
        object-fit: fill;
      }

      .frame-overlay-top {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }
      .frame-overlay-top img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* 팝업 모달 */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
      }
      .modal-content {
        background: white;
        padding: 25px;
        border-radius: 14px;
        text-align: center;
        max-width: 500px;
        width: 100%;
        max-height: 95vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
      }
      #result-image-zone {
        width: 300px;
        height: 442px;
        background: #eee;
        margin: 15px 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
        overflow: hidden;
      }
      #result-image-zone img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .tip-box {
        background: #e6f2ff;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        color: #0056b3;
        margin-bottom: 15px;
        width: 100%;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>물방울 요정 네컷 스튜디오 💧</h1>
    <div class="description">100mm x 148mm 인화 비율 정렬 버전</div>

    <div class="container">
      <div class="controls-panel">
        <video id="camera-view" autoplay playsinline></video>
        <button id="shoot-btn" class="btn" onclick="takeSnapshot()">
          📷 사진 촬영하기 (0/6)
        </button>
        <div class="pool-title">촬영 앨범 (원하는 사진 4장을 클릭)</div>
        <div id="photo-pool" class="photo-pool"></div>
        <button
          id="save-btn"
          class="btn"
          style="background-color: #28a745; margin-top: 25px"
          onclick="generateFourCut()"
          disabled
        >
          ✨ 네컷사진 완성하기
        </button>
      </div>

      <div class="preview-panel">
        <h3>실시간 프레임 미리보기</h3>
        <div class="frame-preview-container">
          <div id="photo-grid" class="photo-grid-under">
            <div class="frame-slot" id="slot-0">Slot 1</div>
            <div class="frame-slot" id="slot-1">Slot 2</div>
            <div class="frame-slot" id="slot-2">Slot 3</div>
            <div class="frame-slot" id="slot-3">Slot 4</div>
          </div>
          <div class="frame-overlay-top">
            <img src="image/water_frame.svg" alt="프레임" />
          </div>
        </div>
      </div>
    </div>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>네컷사진 인화 완료! 🎉</h2>
        <div id="result-image-zone"></div>
        <div class="tip-box">
          💡 **아이패드 저장/공유 꿀팁**<br />
          사진을 **1초간 길게 누르면** 사진 앱에 저장하거나 곧바로 **[AirDrop]**
          전송이 가능합니다!
        </div>
        <button
          class="btn"
          style="background-color: #007bff"
          onclick="triggerDirectDownload()"
        >
          📂 파일로 직접 저장하기
        </button>
        <button
          class="btn"
          style="background-color: #6c757d; margin-top: 10px"
          onclick="closeModal()"
        >
          다시 촬영하기
        </button>
      </div>
    </div>

    <script>
      const video = document.getElementById("camera-view");
      const shootBtn = document.getElementById("shoot-btn");
      const saveBtn = document.getElementById("save-btn");
      const photoPool = document.getElementById("photo-pool");
      const resultModal = document.getElementById("result-modal");
      const resultImageZone = document.getElementById("result-image-zone");

      let photos = [];
      let selectedPhotos = [];
      let finalOutputBase64 = null;

      navigator.mediaDevices
        .getUserMedia({
          video: { width: 1280, height: 960, facingMode: "user" },
        })
        .then((stream) => {
          video.srcObject = stream;
        })
        .catch((err) => {
          alert("카메라 권한을 승인해주세요.");
        });

      function takeSnapshot() {
        if (photos.length >= 6) return;

        const canvas = document.createElement("canvas");
        canvas.width = 351;
        canvas.height = 442;
        const ctx = canvas.getContext("2d");

        const vW = video.videoWidth;
        const vH = video.videoHeight;

        const cropHeight = vH;
        const cropWidth = vH * (351 / 442);
        const cropX = (vW - cropWidth) / 2;
        const cropY = 0;

        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        ctx.drawImage(
          video,
          cropX,
          cropY,
          cropWidth,
          cropHeight,
          0,
          0,
          canvas.width,
          canvas.height,
        );

        // 사진을 찍자마자 완벽하게 자른 깨끗한 주소값 데이터를 고정으로 박아둡니다.
        photos.push(canvas.toDataURL("image/png"));
        shootBtn.innerText = `📷 사진 촬영하기 (${photos.length}/6)`;
        if (photos.length >= 6) {
          shootBtn.disabled = true;
          shootBtn.innerText = "6장 촬영 완료!";
        }
        renderPool();
      }

      function renderPool() {
        photoPool.innerHTML = "";
        photos.forEach((imgUrl) => {
          const item = document.createElement("div");
          item.className = "pool-item";
          const img = document.createElement("img");
          img.src = imgUrl;
          item.appendChild(img);

          const selectIndex = selectedPhotos.indexOf(imgUrl);
          if (selectIndex > -1) {
            item.classList.add("selected");
            const badge = document.createElement("div");
            badge.className = "badge";
            badge.innerText = selectIndex + 1;
            item.appendChild(badge);
          }
          item.onclick = () => toggleSelect(imgUrl);
          photoPool.appendChild(item);
        });
      }

      function toggleSelect(imgUrl) {
        const index = selectedPhotos.indexOf(imgUrl);
        if (index > -1) {
          selectedPhotos.splice(index, 1);
        } else {
          if (selectedPhotos.length < 4) {
            selectedPhotos.push(imgUrl);
          } else {
            alert("4장만 고를 수 있습니다!");
            return;
          }
        }
        saveBtn.disabled = selectedPhotos.length !== 4;
        renderPool();
        renderFramePreview();
      }

      function renderFramePreview() {
        for (let i = 0; i < 4; i++) {
          const slot = document.getElementById(`slot-${i}`);
          if (selectedPhotos[i]) {
            slot.innerHTML = `<img src="${selectedPhotos[i]}" />`;
          } else {
            slot.innerHTML = `Slot ${i + 1}`;
          }
        }
      }

      // 최종 합성 연산 (100mm x 148mm 해상도 다이렉트 드로잉 순서 고정)
      function generateFourCut() {
        if (selectedPhotos.length !== 4) return;

        const finalCanvas = document.createElement("canvas");
        const ctx = finalCanvas.getContext("2d");

        // 100mm x 148mm 표준 해상도 세팅
        const canvasWidth = 1181;
        const canvasHeight = 1748;
        finalCanvas.width = canvasWidth;
        finalCanvas.height = canvasHeight;

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        // 현지님의 여백 비율과 100% 대응되는 절대 좌표 조각들
        const slots = [
          { x: 66, y: 99, w: 521, h: 651 }, // 1번 사진 위치
          { x: 594, y: 99, w: 521, h: 651 }, // 2번 사진 위치
          { x: 66, y: 921, w: 521, h: 651 }, // 3번 사진 위치
          { x: 594, y: 921, w: 521, h: 651 }, // 4번 사진 위치
        ];

        let loadedCount = 0;

        // 반복문을 돌며 순서대로 4개의 구멍 위치에 조각조각 사진을 로드하여 매핑합니다.
        selectedPhotos.forEach((imgSrc, idx) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = imgSrc;

          img.onload = () => {
            // [버그 완전 수정] 원본을 전체 도배하지 않고 slots의 구멍 영역 규격 안에 강제로 압축해서 집어넣습니다.
            ctx.drawImage(
              img,
              0,
              0,
              img.width,
              img.height,
              slots[idx].x,
              slots[idx].y,
              slots[idx].w,
              slots[idx].h,
            );
            loadedCount++;

            // 4장이 확실하게 다 구멍 안에 깔렸을 때만 마지막 프레임을 올립니다.
            if (loadedCount === 4) {
              const realPreviewSvg = document.querySelector(
                ".frame-overlay-top img",
              );
              if (realPreviewSvg) {
                ctx.drawImage(realPreviewSvg, 0, 0, canvasWidth, canvasHeight);
              }

              // 최종 이미지 팝업창 렌더링
              finalOutputBase64 = finalCanvas.toDataURL("image/jpeg", 0.95);
              resultImageZone.innerHTML = `<img src="${finalOutputBase64}">`;
              resultModal.style.display = "flex";
            }
          };
        });
      }

      function triggerDirectDownload() {
        if (!finalOutputBase64) return;
        const link = document.createElement("a");
        link.href = finalOutputBase64;
        link.download = `Photo_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      function closeModal() {
        resultModal.style.display = "none";
        photos = [];
        selectedPhotos = [];
        finalOutputBase64 = null;
        shootBtn.disabled = false;
        shootBtn.innerText = "📷 사진 촬영하기 (0/6)";
        saveBtn.disabled = true;
        renderPool();
        renderFramePreview();
      }
    </script>
  </body>
</html>
