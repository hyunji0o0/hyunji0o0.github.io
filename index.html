<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>아이패드 네컷 스튜디오 - 레이어 완성판</title>
    <style>
      body {
        font-family: "Malgun Gothic", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f0f4f8;
        margin: 0;
        padding: 20px;
        touch-action: manipulation;
      }
      h1 {
        color: #0056b3;
        margin-bottom: 5px;
      }
      .description {
        color: #666;
        margin-bottom: 20px;
      }
      .container {
        display: flex;
        gap: 40px;
        max-width: 1200px;
        width: 100%;
        justify-content: center;
        align-items: flex-start;
      }

      /* 왼쪽 촬영 패널 */
      .controls-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 480px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      #camera-view {
        width: 100%;
        max-width: 440px;
        aspect-ratio: 4/3;
        background: #000;
        border-radius: 12px;
        transform: scaleX(-1);
        border: 3px solid #b3d9ff;
      }
      .btn {
        margin-top: 15px;
        padding: 15px 30px;
        font-size: 18px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        box-sizing: border-box;
      }
      .btn:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }

      /* 6장 풀 */
      .pool-title {
        margin-top: 25px;
        font-weight: bold;
        color: #555;
        align-self: flex-start;
      }
      .photo-pool {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
        width: 100%;
      }
      .pool-item {
        width: 100%;
        aspect-ratio: 4/3;
        background: #ddd;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        border: 4px solid transparent;
        box-sizing: border-box;
      }
      .pool-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pool-item.selected {
        border-color: #28a745;
      }
      .pool-item .badge {
        position: absolute;
        top: 5px;
        right: 5px;
        background: #28a745;
        color: white;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: bold;
      }

      /* 오른쪽 2x2 미리보기 */
      .preview-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 프레임 전체를 감싸는 바구니 */
      .frame-preview-container {
        position: relative;
        width: 360px;
        height: 531px; /* 800x1180 비율에 맞춘 크기 */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        border-radius: 10px;
        overflow: hidden;
      }

      /* [중복 해결 및 화이트 제거 완료] 
         실시간 미리보기 화면에서 사진의 크기와 위치를 조정하는 마법의 구역입니다.
         아래 padding과 gap 수치를 자유롭게 변경해 가며 프레임 눈축과 일치시키세요!
      */
      .photo-grid-under {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);

        /* 🛠️ 이 수치들을 직접 늘리거나 줄여보며 조율하세요! */
        padding: 30px 20px 52px 20px; /* 순서: 상단여백, 우측여백, 하단여백, 좌측여백 */
        gap: 2px 2px; /* 순서: 상하사진공백, 좌우사진공백 */

        box-sizing: border-box;
        z-index: 1;
        background-color: transparent; /* 튀어나오던 흰색 프레임 완벽 제거 */
      }

      .frame-slot {
        background-color: #eaeaea;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaa;
        font-size: 14px;
        border-radius: 3px;
      }
      .frame-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* [레이어 2] 사진 위에 얹어지는 투명 SVG 프레임 */
      .frame-overlay-top {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2; /* 사진보다 위에 존재 */
        pointer-events: none; /* 밑의 사진 클릭을 방해하지 않음 */
      }
      .frame-overlay-top img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* 팝업 모달 */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
      }
      .modal-content {
        background: white;
        padding: 25px;
        border-radius: 14px;
        text-align: center;
        max-width: 500px;
        width: 100%;
        max-height: 95vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
      }
      #result-image-zone {
        width: 300px;
        height: 442px;
        background: #eee;
        margin: 15px 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
        overflow: hidden;
      }
      #result-image-zone img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .tip-box {
        background: #e6f2ff;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        color: #0056b3;
        margin-bottom: 15px;
        width: 100%;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>물방울 요정 네컷 스튜디오 💧</h1>
    <div class="description">레이어 꼬임 및 화질 저하 해결 버전</div>

    <div class="container">
      <div class="controls-panel">
        <video id="camera-view" autoplay playsinline></video>
        <button id="shoot-btn" class="btn" onclick="takeSnapshot()">
          📷 사진 촬영하기 (0/6)
        </button>
        <div class="pool-title">촬영 앨범 (원하는 사진 4장을 클릭)</div>
        <div id="photo-pool" class="photo-pool"></div>
        <button
          id="save-btn"
          class="btn"
          style="background-color: #28a745; margin-top: 25px"
          onclick="generateFourCut()"
          disabled
        >
          ✨ 네컷사진 완성하기
        </button>
      </div>

      <div class="preview-panel">
        <h3>실시간 프레임 미리보기</h3>
        <div class="frame-preview-container">
          <div id="photo-grid" class="photo-grid-under">
            <div class="frame-slot" id="slot-0">Slot 1</div>
            <div class="frame-slot" id="slot-1">Slot 2</div>
            <div class="frame-slot" id="slot-2">Slot 3</div>
            <div class="frame-slot" id="slot-3">Slot 4</div>
          </div>
          <div class="frame-overlay-top">
            <img src="image/water_frame.svg" alt="프레임" />
          </div>
        </div>
      </div>
    </div>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>네컷사진 인화 완료! 🎉</h2>
        <div id="result-image-zone"></div>
        <div class="tip-box">
          💡 **아이패드 저장/공유 꿀팁**<br />
          사진을 **1초간 길게 누르면** 사진 앱에 저장하거나 곧바로 **[AirDrop]**
          전송이 가능합니다!
        </div>
        <button
          class="btn"
          style="background-color: #007bff"
          onclick="triggerDirectDownload()"
        >
          📂 파일로 직접 저장하기
        </button>
        <button
          class="btn"
          style="background-color: #6c757d; margin-top: 10px"
          onclick="closeModal()"
        >
          다시 촬영하기
        </button>
      </div>
    </div>

    <script>
      const video = document.getElementById("camera-view");
      const shootBtn = document.getElementById("shoot-btn");
      const saveBtn = document.getElementById("save-btn");
      const photoPool = document.getElementById("photo-pool");
      const resultModal = document.getElementById("result-modal");
      const resultImageZone = document.getElementById("result-image-zone");

      let photos = [];
      let selectedPhotos = [];
      let finalOutputBase64 = null;

      navigator.mediaDevices
        .getUserMedia({
          video: { width: 1280, height: 960, facingMode: "user" },
        })
        .then((stream) => {
          video.srcObject = stream;
        })
        .catch((err) => {
          alert("카메라 권한을 승인해주세요.");
        });

      function takeSnapshot() {
        if (photos.length >= 6) return;
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");

        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        photos.push(canvas.toDataURL("image/png"));
        shootBtn.innerText = `📷 사진 촬영하기 (${photos.length}/6)`;
        if (photos.length >= 6) {
          shootBtn.disabled = true;
          shootBtn.innerText = "6장 촬영 완료!";
        }
        renderPool();
      }

      function renderPool() {
        photoPool.innerHTML = "";
        photos.forEach((imgUrl) => {
          const item = document.createElement("div");
          item.className = "pool-item";
          const img = document.createElement("img");
          img.src = imgUrl;
          item.appendChild(img);

          const selectIndex = selectedPhotos.indexOf(imgUrl);
          if (selectIndex > -1) {
            item.classList.add("selected");
            const badge = document.createElement("div");
            badge.className = "badge";
            badge.innerText = selectIndex + 1;
            item.appendChild(badge);
          }
          item.onclick = () => toggleSelect(imgUrl);
          photoPool.appendChild(item);
        });
      }

      function toggleSelect(imgUrl) {
        const index = selectedPhotos.indexOf(imgUrl);
        if (index > -1) {
          selectedPhotos.splice(index, 1);
        } else {
          if (selectedPhotos.length < 4) {
            selectedPhotos.push(imgUrl);
          } else {
            alert("4장만 고를 수 있습니다!");
            return;
          }
        }
        saveBtn.disabled = selectedPhotos.length !== 4;
        renderPool();
        renderFramePreview();
      }

      function renderFramePreview() {
        for (let i = 0; i < 4; i++) {
          const slot = document.getElementById(`slot-${i}`);
          if (selectedPhotos[i]) {
            slot.innerHTML = `<img src="${selectedPhotos[i]}" />`;
          } else {
            slot.innerHTML = `Slot ${i + 1}`;
          }
        }
      }

      function generateFourCut() {
        if (selectedPhotos.length !== 4) return;

        const finalCanvas = document.createElement("canvas");
        const ctx = finalCanvas.getContext("2d");
        const frameImg = new Image();

        frameImg.crossOrigin = "Anonymous";
        frameImg.src = "image/water_frame.svg";

        frameImg.onload = () => {
          canvasWidth = frameImg.width;
          canvasHeight = frameImg.height;
          finalCanvas.width = canvasWidth;
          finalCanvas.height = canvasHeight;

          ctx.clearRect(0, 0, canvasWidth, canvasHeight);

          /*
             ⚠️ 직접 제어해 보실 수 있도록 마련해둔 저장(인화) 캔버스용 절대 좌표 구역입니다.
             위쪽 CSS 여백 수치를 다 찾고 난 뒤 최종 파일 인화본이 틀어질 때 
             여기의 x, y, w, h 숫자를 동일 비율로 최종 가다듬어 주시면 완성됩니다!
          */
          const slots = [
            { x: 22, y: 50, w: 370, h: 600 }, // Slot 1 (첫 줄 왼쪽)
            { x: 410, y: 31, w: 368, h: 483 }, // Slot 2 (첫 줄 오른쪽)
            { x: 22, y: 554, w: 368, h: 483 }, // Slot 3 (둘째 줄 왼쪽)
            { x: 410, y: 554, w: 368, h: 483 }, // Slot 4 (둘째 줄 오른쪽)
          ];

          let loadedCount = 0;
          selectedPhotos.forEach((imgData, idx) => {
            const img = new Image();
            img.src = imgData;
            img.onload = () => {
              ctx.drawImage(
                img,
                slots[idx].x,
                slots[idx].y,
                slots[idx].w,
                slots[idx].h,
              );
              loadedCount++;

              if (loadedCount === 4) {
                ctx.drawImage(frameImg, 0, 0, canvasWidth, canvasHeight);

                finalOutputBase64 = finalCanvas.toDataURL("image/jpeg", 0.95);
                resultImageZone.innerHTML = `<img src="${finalOutputBase64}">`;
                resultModal.style.display = "flex";
              }
            };
          });
        };
      }

      function triggerDirectDownload() {
        if (!finalOutputBase64) return;
        const link = document.createElement("a");
        link.href = finalOutputBase64;
        link.download = `Photo_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      function closeModal() {
        resultModal.style.display = "none";
        photos = [];
        selectedPhotos = [];
        finalOutputBase64 = null;
        shootBtn.disabled = false;
        shootBtn.innerText = "📷 사진 촬영하기 (0/6)";
        saveBtn.disabled = true;
        renderPool();
        renderFramePreview();
      }
    </script>
  </body>
</html>
